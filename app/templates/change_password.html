<!DOCTYPE html>
<html lang="pt-BR" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha — Stone Messages</title>
    <meta name="description" content="Altere sua senha no Stone Messages">
    <link rel="icon" href="/static/icons/icon-192x192.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">🔐</div>
        <h1 class="auth-title">Alterar Senha</h1>
        <p class="auth-subtitle">Mantenha sua conta segura</p>

        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form class="auth-form" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="auth-input-group">
                <span class="auth-input-icon">🔑</span>
                <input class="auth-input" type="password" name="current_password" placeholder="Senha atual" required autocomplete="current-password">
            </div>
            <div class="auth-input-group">
                <span class="auth-input-icon">🔒</span>
                <input class="auth-input" type="password" name="new_password" placeholder="Nova senha" required minlength="6" autocomplete="new-password">
            </div>
            <div class="auth-input-group">
                <span class="auth-input-icon">🔒</span>
                <input class="auth-input" type="password" name="confirm_password" placeholder="Confirme a nova senha" required autocomplete="new-password">
            </div>
            <button class="auth-btn" type="submit">Salvar</button>
        </form>

        <p class="auth-link">
            <a href="{{ url_for('index') }}">← Voltar ao chat</a>
        </p>
    </div>

    <div class="theme-decoration"></div>
</body>
</html>
