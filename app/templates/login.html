<!DOCTYPE html>
<html lang="pt-BR" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Stone Messages</title>
    <meta name="description" content="Faça login no Stone Messages">
    <link rel="icon" href="/static/icons/icon-192x192.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">💬</div>
        <h1 class="auth-title">Stone Messages</h1>
        <p class="auth-subtitle">Entre para continuar conversando</p>

        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form class="auth-form" method="POST" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="auth-input-group">
                <span class="auth-input-icon">👤</span>
                <input class="auth-input" type="text" name="username" id="username" placeholder="Nome de usuário" required autocomplete="username">
            </div>
            <div class="auth-input-group">
                <span class="auth-input-icon">🔒</span>
                <input class="auth-input" type="password" name="password" id="password" placeholder="Senha" required autocomplete="current-password">
            </div>
            <button class="auth-btn" type="submit" id="loginBtn">Entrar</button>
        </form>

        <p class="auth-link">
            Não tem uma conta? <a href="{{ url_for('register') }}">Registre-se</a>
        </p>
    </div>

    <div class="theme-decoration"></div>
</body>
</html>
