<!DOCTYPE html>
<html lang="pt-BR" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — Stone Messages</title>
    <meta name="description" content="Crie sua conta no Stone Messages">
    <link rel="icon" href="/static/icons/icon-192x192.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">✨</div>
        <h1 class="auth-title">Criar Conta</h1>
        <p class="auth-subtitle">Junte-se ao Stone Messages</p>

        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form class="auth-form" method="POST" id="registerForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="auth-input-group">
                <span class="auth-input-icon">👤</span>
                <input class="auth-input" type="text" name="username" id="username" placeholder="Nome de usuário" required minlength="3" maxlength="30" autocomplete="username">
            </div>
            <div class="auth-input-group">
                <span class="auth-input-icon">🔒</span>
                <input class="auth-input" type="password" name="password" id="password" placeholder="Senha" required minlength="6" autocomplete="new-password">
            </div>
            <div class="auth-input-group">
                <span class="auth-input-icon">🔒</span>
                <input class="auth-input" type="password" name="confirm_password" id="confirmPassword" placeholder="Confirme a senha" required autocomplete="new-password">
            </div>
            <div class="auth-input-group">
                <span class="auth-input-icon">🎟️</span>
                <input class="auth-input" type="text" name="registration_code" id="registrationCode" placeholder="Código de convite" required autocomplete="off">
            </div>
            <button class="auth-btn" type="submit" id="registerBtn">Registrar</button>
        </form>

        <p class="auth-link">
            Já tem uma conta? <a href="{{ url_for('login') }}">Faça login</a>
        </p>
    </div>

    <div class="theme-decoration"></div>
</body>
</html>
